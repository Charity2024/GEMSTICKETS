<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEMS MASTER | Production Engine</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff3c00; --accent: #ffb800; --bg: #050505;
            --card-bg: rgba(20, 20, 20, 0.7); --border: rgba(255, 255, 255, 0.1);
        }
        body {
            font-family: 'Inter', sans-serif; background-color: var(--bg);
            background-image: radial-gradient(circle at 50% -20%, #4a1111 0%, transparent 50%);
            color: white; margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center;
        }
        nav {
            width: 100%; padding: 20px 0; display: flex; justify-content: center; gap: 30px;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border);
        }
        nav a { color: white; text-decoration: none; font-size: 0.7rem; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; opacity: 0.5; }
        
        .container { display: flex; flex-direction: row; gap: 40px; padding: 50px; max-width: 1200px; width: 95%; align-items: flex-start; }
        
        .generator-card { 
            background: var(--card-bg); border: 1px solid var(--border); 
            padding: 30px; border-radius: 24px; width: 400px; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.5); position: relative;
        }

        /* The Status Counter Badge */
        .status-badge {
            position: absolute; top: -12px; right: 20px;
            background: var(--primary); color: white; padding: 5px 15px;
            border-radius: 20px; font-size: 0.65rem; font-weight: 900;
            letter-spacing: 1px; box-shadow: 0 5px 15px rgba(255, 60, 0, 0.4);
        }

        .input-group { margin-bottom: 15px; text-align: left; }
        label { display: block; font-size: 0.6rem; text-transform: uppercase; color: var(--accent); margin-bottom: 5px; font-weight: 800; }
        input { width: 100%; padding: 14px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 12px; color: white; box-sizing: border-box; }
        
        .preview-pane { flex: 1; text-align: center; }
        #previewCanvas { width: 100%; border-radius: 15px; border: 1px solid var(--border); background: #111; }
        
        .btn-main { width: 100%; padding: 18px; background: white; color: black; border: none; border-radius: 12px; font-weight: 900; text-transform: uppercase; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-main:hover { background: var(--primary); color: white; }
        
        .download-btn { display: none; width: 100%; padding: 18px; background: #00ff88; color: black; border-radius: 12px; font-weight: 900; text-decoration: none; text-align: center; margin-top: 15px; cursor: pointer; }
        .whatsapp-tool { display: none; margin-top: 10px; font-size: 0.8rem; color: #aaa; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; }
        
        @media (max-width: 1000px) { .container { flex-direction: column; } .generator-card { width: 100%; } }
    </style>
</head>
<body>

<nav>
    <a href="add-ticket.html" style="opacity:1; color:var(--primary)">Generator</a>
    <a href="scan.html">Staff Scan</a>
    <a href="dashboard.html">Admin</a>
</nav>

<div class="container">
    <div class="generator-card">
        <div id="liveCount" class="status-badge">SYNCING...</div>
        <h2 style="font-family:'Syncopate'; font-size:1.2rem; margin:0 0 20px 0; color:white;">GEMS ENGINE</h2>
        
        <div class="input-group">
            <label>Full Name</label>
            <input type="text" id="full_name" placeholder="Guest Name" oninput="updateLivePreview()">
        </div>

        <div class="input-group">
            <label>Phone Number</label>
            <input type="text" id="phone_number" placeholder="07... or 254...">
        </div>

        <div class="input-group">
            <label>M-Pesa Code</label>
            <input type="text" id="mpesa_code" placeholder="10 Characters" maxlength="10">
        </div>
        
        <button id="submitBtn" class="btn-main" onclick="createTicket()">Issue Ticket</button>
        <div id="downloadBtn" class="download-btn" onclick="downloadTicket()">Download Image</div>
        
        <div id="whatsappTool" class="whatsapp-tool">
            <p id="waText"></p>
            <button onclick="copyWA()" style="background:none; border:1px solid #555; color:white; padding:5px; cursor:pointer; border-radius:4px;">Copy Message</button>
        </div>

        <p id="resetLink" style="display:none; cursor:pointer; font-size:0.8rem; color:var(--primary); margin-top:20px; font-weight:bold;" onclick="location.reload()">+ Create Next Ticket</p>
    </div>

    <div class="preview-pane">
        <canvas id="previewCanvas" width="1500" height="400"></canvas>
        <p id="statusMsg" style="color:var(--accent); font-size:0.8rem; margin-top:10px; font-weight:bold;"></p>
    </div>
</div>

<script>
    const supabaseClient = window.supabase.createClient(
        "https://rpkntkivikvwisgwgkzx.supabase.co",
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJwa250a2l2aWt2d2lzZ3dna3p4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NDk5NjgsImV4cCI6MjA4ODEyNTk2OH0._EQI_iPpCGCjXmamFnACTSjy57X_JGBcKNx4vbsRw_8"
    );

    let nextTicketID = "GEMS...";
    const bg = new Image();
    bg.src = "background.jpeg";
    bg.onload = updateLivePreview;

    // INITIAL LOAD & COUNTER
    async function syncSystem() {
        const { count, error } = await supabaseClient.from('tickets').select('*', { count: 'exact', head: true });
        if (!error) {
            const currentTotal = count || 0;
            document.getElementById('liveCount').innerText = `TOTAL ISSUED: ${currentTotal}`;
            nextTicketID = "GEMS" + (currentTotal + 1).toString().padStart(3, '0');
            updateLivePreview();
        }
    }
    syncSystem();

    function sanitizePhone(phone) {
        let cleaned = phone.replace(/\D/g, '');
        if (cleaned.startsWith('0')) cleaned = '254' + cleaned.substring(1);
        else if (cleaned.startsWith('7') || cleaned.startsWith('1')) cleaned = '254' + cleaned;
        return '+' + cleaned;
    }

    function updateLivePreview() {
        const canvas = document.getElementById("previewCanvas");
        const ctx = canvas.getContext("2d");
        const name = document.getElementById("full_name").value.toUpperCase() || "GUEST NAME";
        ctx.fillStyle = "white"; ctx.fillRect(0, 0, 1500, 400);
        if (bg.complete) ctx.drawImage(bg, 0, 0, 1200, 400);
        
        ctx.save();
        ctx.translate(1485, 380);
        ctx.rotate(-Math.PI / 2);
        ctx.fillStyle = "black";
        ctx.font = "bold 22px Courier New";
        ctx.fillText("ID: " + nextTicketID, 0, 0);
        ctx.fillStyle = "#888";
        ctx.font = "bold 18px sans-serif";
        ctx.fillText(name, 210, 0); 
        ctx.restore();
    }

    async function createTicket() {
        const name = document.getElementById("full_name").value.trim();
        const rawPhone = document.getElementById("phone_number").value.trim();
        const mpesa = document.getElementById("mpesa_code").value.trim().toUpperCase();

        if(!name || mpesa.length !== 10 || !rawPhone) return alert("Double check Name and M-Pesa Code.");

        const cleanPhone = sanitizePhone(rawPhone);
        document.getElementById("submitBtn").innerText = "REGISTERING...";
        const qr_token = crypto.randomUUID();

        const { error } = await supabaseClient.from("tickets").insert([{
            full_name: name, phone_number: cleanPhone, mpesa_code: mpesa, ticket_id: nextTicketID, qr_token: qr_token
        }]);

        if (error) { alert(error.message); return; }

        QRCode.toDataURL(qr_token, { margin: 1, width: 220 }, function (err, url) {
            const canvas = document.getElementById("previewCanvas");
            const ctx = canvas.getContext("2d");
            const qrImg = new Image();
            qrImg.src = url;
            qrImg.onload = async function() {
                ctx.drawImage(qrImg, 1240, 90, 220, 220);
                document.getElementById("downloadBtn").style.display = "block";
                document.getElementById("submitBtn").style.display = "none";
                document.getElementById("resetLink").style.display = "block";
                document.getElementById("statusMsg").innerText = "GENERATED: " + nextTicketID;
                
                document.getElementById("whatsappTool").style.display = "block";
                document.getElementById("waText").innerText = `Hi ${name.split(' ')[0]}, here is your ticket for Gems In The Ruff! ID: ${nextTicketID}`;
                
                await syncSystem(); // Update the counter immediately
            };
        });
    }

    function copyWA() {
        const text = document.getElementById("waText").innerText;
        navigator.clipboard.writeText(text);
        alert("Message copied!");
    }

    function downloadTicket() {
        const canvas = document.getElementById("previewCanvas");
        const link = document.createElement('a');
        link.download = `Ticket_${nextTicketID}.jpg`;
        link.href = canvas.toDataURL("image/jpeg", 1.0);
        link.click();
    }
</script>
</body>
</html>

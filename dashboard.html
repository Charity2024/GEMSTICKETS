<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gems Admin | Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff3c00; --accent: #ffb800; --bg: #050505;
            --card-bg: rgba(20, 20, 20, 0.7); --border: rgba(255, 255, 255, 0.1);
            --success: #00ff88;
        }
        body {
            font-family: 'Inter', sans-serif; background-color: var(--bg);
            background-image: radial-gradient(circle at 50% 120%, #4a1111 0%, transparent 50%);
            color: white; margin: 0; min-height: 100vh;
        }
        nav {
            width: 100%; padding: 20px 0; display: flex; justify-content: center; gap: 30px;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border);
        }
        nav a { color: white; text-decoration: none; font-size: 0.7rem; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; opacity: 0.5; }
        nav a.active { opacity: 1; color: var(--primary); }

        .container { padding: 50px; max-width: 1200px; margin: 0 auto; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 20px; }
        h1 { font-family: 'Syncopate'; font-size: 1.5rem; margin: 0; }
        .controls { display: flex; gap: 15px; align-items: center; }

        #searchInput {
            padding: 12px 20px; background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            border-radius: 8px; color: white; width: 300px; transition: 0.3s;
        }

        .btn-export {
            background: var(--accent); color: black; border: none; padding: 12px 24px;
            border-radius: 8px; font-weight: 900; cursor: pointer; text-transform: uppercase;
            font-size: 0.75rem; letter-spacing: 1px;
        }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--card-bg); border: 1px solid var(--border); padding: 20px; border-radius: 16px; text-align: center; }
        .stat-val { display: block; font-size: 2rem; font-weight: 900; color: var(--primary); }
        .stat-label { font-size: 0.7rem; text-transform: uppercase; color: #777; }

        table { width: 100%; border-collapse: collapse; background: var(--card-bg); border-radius: 16px; overflow: hidden; border: 1px solid var(--border); }
        th { background: rgba(255,255,255,0.05); text-align: left; padding: 15px; font-size: 0.7rem; text-transform: uppercase; color: var(--accent); }
        td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        
        .verify-btn {
            background: transparent; border: 1px solid var(--success); color: var(--success);
            padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.7rem;
            font-weight: 800; text-transform: uppercase; transition: 0.3s;
        }
        .verify-btn:hover { background: var(--success); color: black; }
        .status-badge { font-weight: 900; font-size: 0.75rem; color: var(--success); }
    </style>
</head>
<body>

<nav>
    <a href="index.html">Generator</a>
    <a href="scan.html">Staff Scan</a>
    <a href="dashboard.html" class="active">Admin</a>
</nav>

<div class="container">
    <div class="header-flex">
        <h1>GEMS MASTER LIST</h1>
        <div class="controls">
            <input type="text" id="searchInput" placeholder="Search name, ID, or M-Pesa..." oninput="filterData()">
            <button class="btn-export" onclick="exportToCSV()">Export CSV</button>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <span id="totalTickets" class="stat-val">0</span>
            <span class="stat-label">Tickets Issued</span>
        </div>
        <div class="stat-card">
            <span id="checkedIn" class="stat-val">0</span>
            <span class="stat-label">Checked In</span>
        </div>
    </div>

    <table id="guestTable">
        <thead>
            <tr>
                <th>Ticket ID</th>
                <th>Guest Name</th>
                <th>Phone</th>
                <th>M-Pesa</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    const supabaseClient = window.supabase.createClient(
        "https://rpkntkivikvwisgwgkzx.supabase.co",
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJwa250a2l2aWt2d2lzZ3dna3p4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NDk5NjgsImV4cCI6MjA4ODEyNTk2OH0._EQI_iPpCGCjXmamFnACTSjy57X_JGBcKNx4vbsRw_8"
    );

    let allGuests = [];

    async function loadData() {
        const { data, error } = await supabaseClient
            .from('tickets')
            .select('*')
            .order('created_at', { ascending: false });

        if (error) return console.error(error);
        
        allGuests = data;
        renderTable(allGuests);
        updateStats(); // Ensure stats update on fresh load
    }

    function renderTable(data) {
        const body = document.getElementById('tableBody');
        body.innerHTML = '';

        data.forEach(guest => {
            const actionHTML = guest.is_scanned 
                ? '<span class="status-badge">✅ CHECKED IN</span>' 
                : `<button class="verify-btn" onclick="manualVerify('${guest.ticket_id}', '${guest.full_name}')">Verify Now</button>`;

            const row = `<tr>
                <td style="font-family:monospace; font-weight:bold; color:var(--primary)">${guest.ticket_id}</td>
                <td>${guest.full_name}</td>
                <td>${guest.phone_number || 'N/A'}</td>
                <td style="font-family:monospace">${guest.mpesa_code}</td>
                <td>${actionHTML}</td>
            </tr>`;
            body.innerHTML += row;
        });
    }

    function updateStats() {
        document.getElementById('totalTickets').innerText = allGuests.length;
        document.getElementById('checkedIn').innerText = allGuests.filter(g => g.is_scanned).length;
    }

    async function manualVerify(ticketID, guestName) {
        const confirmed = confirm(`MANUAL VERIFICATION:\nAre you sure you want to check in ${guestName} (${ticketID})?`);
        
        if (confirmed) {
            const { error } = await supabaseClient
                .from('tickets')
                .update({ is_scanned: true, scanned_at: new Date().toISOString() })
                .eq('ticket_id', ticketID);

            if (error) {
                alert("Error: " + error.message);
            } else {
                loadData(); // Refresh everything
            }
        }
    }

    function filterData() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allGuests.filter(guest => 
            (guest.full_name || "").toLowerCase().includes(term) ||
            (guest.ticket_id || "").toLowerCase().includes(term) ||
            (guest.mpesa_code || "").toLowerCase().includes(term)
        );
        renderTable(filtered);
    }

    function exportToCSV() {
        if (allGuests.length === 0) return alert("No data!");
        const headers = ["Ticket ID", "Full Name", "Phone", "M-Pesa Code", "Status"];
        const rows = allGuests.map(g => [g.ticket_id, g.full_name, g.phone_number, g.mpesa_code, g.is_scanned ? 'In' : 'Out']);
        let csvContent = "data:text/csv;charset=utf-8," + headers.join(",") + "\n" + rows.map(e => e.join(",")).join("\n");
        const link = document.createElement("a");
        link.href = encodeURI(csvContent);
        link.download = "Gems_Guest_List.csv";
        link.click();
    }

    loadData();
</script>
</body>
</html>

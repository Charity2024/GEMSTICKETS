<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEMS MASTER | Production & Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff3c00; --accent: #ffb800; --bg: #050505; --card-bg: rgba(20, 20, 20, 0.7); --border: rgba(255, 255, 255, 0.1); --success: #00ff88; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); background-image: radial-gradient(circle at 50% -20%, #4a1111 0%, transparent 50%); color: white; margin: 0; min-height: 100vh; }
        nav { width: 100%; padding: 20px 0; display: flex; justify-content: center; gap: 30px; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        nav a { color: white; text-decoration: none; font-size: 0.7rem; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; opacity: 0.5; }
        nav a.active { opacity: 1; color: var(--primary); }

        .container { padding: 40px; max-width: 1200px; margin: 0 auto; }
        
        /* Generator Styling */
        .gen-section { display: flex; gap: 30px; margin-bottom: 60px; background: var(--card-bg); padding: 30px; border-radius: 24px; border: 1px solid var(--border); }
        .gen-inputs { flex: 1; }
        .gen-preview { flex: 1.5; text-align: center; }
        #previewCanvas { width: 100%; border-radius: 12px; border: 1px solid var(--border); background: #000; }

        input { width: 100%; padding: 14px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 10px; color: white; margin-bottom: 15px; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 16px; background: white; color: black; border: none; border-radius: 10px; font-weight: 900; text-transform: uppercase; cursor: pointer; }
        .btn-main:hover { background: var(--primary); color: white; }

        /* Admin Table Styling */
        .admin-section { background: var(--card-bg); border-radius: 24px; border: 1px solid var(--border); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background: rgba(255,255,255,0.05); text-align: left; padding: 15px; font-size: 0.65rem; color: var(--accent); text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 0.6rem; font-weight: 900; }

        .repair-overlay { position: fixed; bottom: 20px; right: 20px; width: 300px; background: #111; border: 2px solid var(--primary); padding: 15px; border-radius: 15px; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
    </style>
</head>
<body>

<nav>
    <a href="index.html" class="active">Generator & Admin</a>
    <a href="scan.html">Staff Scan</a>
</nav>

<div class="container">
    <h1 style="font-family:'Syncopate'; font-size: 1.2rem; margin-bottom: 20px; color: var(--primary);">01. ISSUE NEW TICKET</h1>
    <div class="gen-section">
        <div class="gen-inputs">
            <div id="liveCount" style="color:var(--accent); font-weight:900; font-size:0.7rem; margin-bottom:10px;">SYNCING...</div>
            <input type="text" id="full_name" placeholder="Guest Full Name" oninput="drawTicket('GEMS...', false)">
            <input type="text" id="phone_number" placeholder="Phone (e.g. 07...)">
            <input type="text" id="mpesa_code" placeholder="M-Pesa Code (10 chars)" maxlength="10">
            <button id="submitBtn" class="btn-main" onclick="processRegistration()">Generate & Save</button>
            <div id="downloadArea" style="display:none; margin-top:15px;">
                <button class="btn-main" style="background:var(--success)" onclick="downloadImg('previewCanvas')">Download Ticket</button>
                <p style="font-size:0.7rem; color:#888; margin-top:10px; cursor:pointer;" onclick="location.reload()">+ Create Another</p>
            </div>
        </div>
        <div class="gen-preview">
            <canvas id="previewCanvas" width="1500" height="400"></canvas>
        </div>
    </div>

    <h1 style="font-family:'Syncopate'; font-size: 1.2rem; margin-bottom: 20px; color: var(--primary);">02. MASTER GUEST LIST</h1>
    <div class="admin-section">
        <div style="padding: 15px; border-bottom: 1px solid var(--border);">
            <input type="text" id="searchInput" placeholder="Search by name, ID, or M-Pesa..." oninput="filterData()" style="margin-bottom:0;">
        </div>
        <table>
            <thead><tr><th>ID</th><th>Guest Name</th><th>M-Pesa</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<div id="repairOverlay" class="repair-overlay">
    <h4 style="margin:0 0 10px 0; font-size:0.7rem; color:var(--accent);">REPAIRING TICKET</h4>
    <canvas id="repairCanvas" width="1500" height="400" style="width:100%; border-radius:5px;"></canvas>
    <button class="btn-main" style="margin-top:10px; font-size:0.7rem; padding:10px;" onclick="downloadImg('repairCanvas')">Download Fixed</button>
    <button onclick="document.getElementById('repairOverlay').style.display='none'" style="background:none; border:none; color:white; cursor:pointer; display:block; width:100%; margin-top:5px; font-size:0.6rem;">Close</button>
</div>

<script>
    const supabaseClient = window.supabase.createClient("https://rpkntkivikvwisgwgkzx.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJwa250a2l2aWt2d2lzZ3dna3p4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NDk5NjgsImV4cCI6MjA4ODEyNTk2OH0._EQI_iPpCGCjXmamFnACTSjy57X_JGBcKNx4vbsRw_8");
    
    let allGuests = [];
    const bg = new Image(); bg.src = "background.jpeg";
    bg.onload = () => drawTicket("GEMS...", false);

    async function syncData() {
        const { data } = await supabaseClient.from('tickets').select('*').order('created_at', { ascending: false });
        allGuests = data || [];
        document.getElementById('liveCount').innerText = `DATABASE TOTAL: ${allGuests.length}`;
        renderTable(allGuests);
    }

    function renderTable(data) {
        const body = document.getElementById('tableBody');
        body.innerHTML = '';
        data.forEach(g => {
            body.innerHTML += `<tr>
                <td style="font-weight:900; color:var(--primary)">${g.ticket_id}</td>
                <td>${g.full_name}</td>
                <td style="font-family:monospace">${g.mpesa_code}</td>
                <td><span class="status-badge" style="background:${g.is_scanned ? '#00ff8822' : '#ffffff11'}; color:${g.is_scanned ? 'var(--success)' : '#888'}">${g.is_scanned ? 'IN' : 'OUT'}</span></td>
                <td><button onclick="prepRepair('${g.ticket_id}')" style="background:none; border:1px solid var(--accent); color:var(--accent); padding:4px 8px; cursor:pointer; border-radius:4px; font-size:0.6rem;">FIX</button></td>
            </tr>`;
        });
    }

    function drawTicket(id, qrUrl, targetCanvas = "previewCanvas") {
        const canvas = document.getElementById(targetCanvas);
        const ctx = canvas.getContext("2d");
        const name = (targetCanvas === "previewCanvas" ? document.getElementById("full_name").value : "").toUpperCase() || "GUEST NAME";
        
        ctx.fillStyle = "white"; ctx.fillRect(0,0,1500,400);
        if(bg.complete) ctx.drawImage(bg, 0, 0, 1200, 400);
        
        if(qrUrl) {
            const qr = new Image(); 
            qr.onload = () => ctx.drawImage(qr, 1240, 90, 220, 220);
            qr.src = qrUrl;
        }

        ctx.save();
        ctx.translate(1485, 380); ctx.rotate(-Math.PI/2);
        ctx.fillStyle = "black"; ctx.font = "bold 22px Courier New";
        ctx.fillText("ID: " + id, 0, 0);
        ctx.fillStyle = "#888"; ctx.font = "bold 18px sans-serif";
        ctx.fillText(name, 210, 0);
        ctx.restore();
    }

    async function processRegistration() {
        const name = document.getElementById("full_name").value.trim();
        const mpesa = document.getElementById("mpesa_code").value.trim().toUpperCase();
        if(!name || mpesa.length !== 10) return alert("Check Name/M-Pesa");

        const btn = document.getElementById("submitBtn");
        btn.disabled = true; btn.innerText = "SAVING...";

        const newID = "GEMS" + (allGuests.length + 1).toString().padStart(3, '0');
        const token = crypto.randomUUID();

        const { error } = await supabaseClient.from('tickets').insert([{
            full_name: name, ticket_id: newID, mpesa_code: mpesa, qr_token: token,
            phone_number: document.getElementById("phone_number").value
        }]);

        if(error) { alert(error.message); btn.disabled = false; return; }

        QRCode.toDataURL(token, { margin: 1, width: 220 }, (err, url) => {
            drawTicket(newID, url);
            document.getElementById("downloadArea").style.display = "block";
            btn.style.display = "none";
            syncData();
        });
    }

    function prepRepair(id) {
        const guest = allGuests.find(g => g.ticket_id === id);
        document.getElementById('repairOverlay').style.display = 'block';
        QRCode.toDataURL(guest.qr_token, { margin: 1, width: 220 }, (err, url) => {
            const canvas = document.getElementById("repairCanvas");
            const ctx = canvas.getContext("2d");
            ctx.fillStyle = "white"; ctx.fillRect(0,0,1500,400);
            ctx.drawImage(bg, 0, 0, 1200, 400);
            const qr = new Image();
            qr.onload = () => {
                ctx.drawImage(qr, 1240, 90, 220, 220);
                ctx.save();
                ctx.translate(1485, 380); ctx.rotate(-Math.PI/2);
                ctx.fillStyle = "black"; ctx.font = "bold 22px Courier New";
                ctx.fillText("ID: " + guest.ticket_id, 0, 0);
                ctx.fillStyle = "#888"; ctx.font = "bold 18px sans-serif";
                ctx.fillText(guest.full_name.toUpperCase(), 210, 0);
                ctx.restore();
            };
            qr.src = url;
        });
    }

    function downloadImg(canvasId) {
        const link = document.createElement('a');
        link.download = 'GEMS_TICKET.jpg';
        link.href = document.getElementById(canvasId).toDataURL("image/jpeg", 1.0);
        link.click();
    }

    function filterData() {
        const val = document.getElementById("searchInput").value.toLowerCase();
        renderTable(allGuests.filter(g => g.full_name.toLowerCase().includes(val) || g.ticket_id.toLowerCase().includes(val)));
    }

    syncData();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEMS TICKETS | Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff3c00; --accent: #ffb800; --bg: #050505; --card-bg: rgba(20, 20, 20, 0.7); --border: rgba(255, 255, 255, 0.1); --success: #00ff88; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); background-image: radial-gradient(circle at 50% -20%, #4a1111 0%, transparent 50%); color: white; margin: 0; min-height: 100vh; }
        nav { width: 100%; padding: 20px 0; display: flex; justify-content: center; gap: 30px; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        nav a { color: white; text-decoration: none; font-size: 0.7rem; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; opacity: 0.5; }
        nav a.active { opacity: 1; color: var(--primary); }
        .container { padding: 40px; max-width: 1200px; margin: 0 auto; }
        .gen-section { display: flex; gap: 30px; margin-bottom: 60px; background: var(--card-bg); padding: 30px; border-radius: 24px; border: 1px solid var(--border); }
        .gen-inputs { flex: 1; }
        .gen-preview { flex: 1.5; text-align: center; }
        #previewCanvas { width: 100%; border-radius: 12px; border: 1px solid var(--border); background: #000; }
        input { width: 100%; padding: 14px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 10px; color: white; margin-bottom: 15px; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 16px; background: white; color: black; border: none; border-radius: 10px; font-weight: 900; text-transform: uppercase; cursor: pointer; margin-bottom: 10px; }
        .btn-main:hover { background: var(--primary); color: white; }
        .admin-section { background: var(--card-bg); border-radius: 24px; border: 1px solid var(--border); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background: rgba(255,255,255,0.05); text-align: left; padding: 15px; font-size: 0.65rem; color: var(--accent); text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
    </style>
</head>
<body>

<nav>
    <a href="index.html" class="active">Generator</a>
    <a href="scan.html">Staff Scan</a>
    <a href="dashboard.html">Admin Dashboard</a>
</nav>

<div class="container">
    <h1 style="font-family:'Syncopate'; font-size: 1.2rem; margin-bottom: 20px; color: var(--primary);">01. ISSUE TICKET</h1>
    <div class="gen-section">
        <div class="gen-inputs">
            <div id="liveCount" style="color:var(--accent); font-weight:900; font-size:0.7rem; margin-bottom:10px;">SYNCING...</div>
            <input type="text" id="full_name" placeholder="Guest Full Name">
            <input type="text" id="phone_number" placeholder="Phone Number">
            <input type="text" id="mpesa_code" placeholder="M-Pesa Code (10 chars)" maxlength="10">
            <button id="submitBtn" class="btn-main" onclick="processRegistration()">Generate & Save</button>
            
            <div id="downloadArea" style="display:none; margin-top:15px;">
                <button id="dlBtn" class="btn-main" style="background:var(--success); color:black;">Download Ticket</button>
                <button id="msgBtn" class="btn-main" style="background:var(--accent); color:black;">Copy Invite Message</button>
                <p style="font-size:0.7rem; color:#888; margin-top:10px; cursor:pointer; text-align:center;" onclick="location.reload()">+ Create Next Ticket</p>
            </div>
        </div>
        <div class="gen-preview">
            <canvas id="previewCanvas" width="1500" height="400"></canvas>
        </div>
    </div>

    <h1 style="font-family:'Syncopate'; font-size: 1.2rem; margin-bottom: 20px; color: var(--primary);">02. GUEST LIST</h1>
    <div class="admin-section">
        <table>
            <thead><tr><th>ID</th><th>Guest Name</th><th>M-Pesa</th><th>Status</th></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    // --- ADMIN SECURITY ---
    if (sessionStorage.getItem("gems_auth") !== "true") {
        const pw = prompt("Enter Admin Password:");
        if (pw === "Gems2026") {
            sessionStorage.setItem("gems_auth", "true");
        } else {
            alert("Unauthorized Access");
            window.location.href = "scan.html"; // Redirect to the open scan page instead of index loop
        }
    }

    const supabaseClient = window.supabase.createClient("https://rpkntkivikvwisgwgkzx.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJwa250a2l2aWt2d2lzZ3dna3p4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NDk5NjgsImV4cCI6MjA4ODEyNTk2OH0._EQI_iPpCGCjXmamFnACTSjy57X_JGBcKNx4vbsRw_8");
    
    let allGuests = [];
    const bg = new Image(); bg.src = "background.jpeg";

    async function syncData() {
        const { data } = await supabaseClient.from('tickets').select('*').order('created_at', { ascending: false });
        allGuests = data || [];
        document.getElementById('liveCount').innerText = `TOTAL GUESTS: ${allGuests.length}`;
        renderTable(allGuests);
    }

    function renderTable(data) {
        const body = document.getElementById('tableBody');
        body.innerHTML = '';
        data.forEach(g => {
            body.innerHTML += `<tr>
                <td style="font-weight:900; color:var(--primary)">${g.ticket_id}</td>
                <td>${g.full_name}</td>
                <td style="font-family:monospace">${g.mpesa_code}</td>
                <td>${g.is_scanned ? '✅ IN' : '❌ OUT'}</td>
            </tr>`;
        });
    }

    async function processRegistration() {
        const name = document.getElementById("full_name").value.trim();
        const mpesa = document.getElementById("mpesa_code").value.trim().toUpperCase();
        if(!name || mpesa.length !== 10) return alert("Please check name and M-Pesa code.");

        const btn = document.getElementById("submitBtn");
        btn.disabled = true; btn.innerText = "SAVING...";

        // Force naming to start at 001 based on current count
        const newID = "GEMS" + (allGuests.length + 1).toString().padStart(3, '0');
        const token = crypto.randomUUID();

        const { error } = await supabaseClient.from('tickets').insert([{
            full_name: name, ticket_id: newID, mpesa_code: mpesa, qr_token: token,
            phone_number: document.getElementById("phone_number").value
        }]);

        if(error) { alert("Supabase Error: " + error.message); btn.disabled = false; return; }

        QRCode.toDataURL(token, { margin: 1, width: 220 }, (err, url) => {
            drawTicket(newID, url, name);
            document.getElementById("downloadArea").style.display = "block";
            btn.style.display = "none";
            document.getElementById("dlBtn").onclick = () => downloadImg(newID);
            document.getElementById("msgBtn").onclick = () => copyInvite(name, newID);
            syncData();
        });
    }

    function drawTicket(id, qrUrl, guestName) {
        const canvas = document.getElementById("previewCanvas");
        const ctx = canvas.getContext("2d");
        ctx.fillStyle = "white"; ctx.fillRect(0,0,1500,400);
        if(bg.complete) ctx.drawImage(bg, 0, 0, 1200, 400);
        
        const qr = new Image(); 
        qr.onload = () => {
            ctx.drawImage(qr, 1240, 90, 220, 220);
            ctx.save();
            ctx.translate(1485, 380); ctx.rotate(-Math.PI/2);
            ctx.fillStyle = "black"; ctx.font = "bold 22px Courier New";
            ctx.fillText("ID: " + id, 0, 0);
            ctx.fillStyle = "#888"; ctx.font = "bold 18px sans-serif";
            ctx.fillText(guestName.toUpperCase(), 210, 0);
            ctx.restore();
        };
        qr.src = qrUrl;
    }

    function downloadImg(filename) {
        const link = document.createElement('a');
        link.download = `${filename}.jpg`;
        link.href = document.getElementById("previewCanvas").toDataURL("image/jpeg", 1.0);
        link.click();
    }

    function copyInvite(name, id) {
        const msg = `💎 GEMS IN THE RUFF 💎\n\nHi ${name.split(' ')[0]},\n\nPayment confirmed! Above is your ticket for March 9th at Assembly Hall.\n\nTicket ID: ${id}\n\nPlease save this image and show it at the entrance. See you there! 🥂`;
        navigator.clipboard.writeText(msg).then(() => alert("Message copied!"));
    }

    syncData();
</script>
</body>
</html>
